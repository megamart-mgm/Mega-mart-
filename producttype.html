<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Choose a Product Type | Mega Mart</title>
<meta content="Choose the type of product you want to sell on Mega Mart." name="description"/>
<meta content="sell online, digital products, physical products, services Nigeria" name="keywords"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: { extend: {
          "colors": {
            "on-surface-variant": "#3e4a3d", "surface-container": "#e5eeff", "on-surface": "#0b1c30",
            "surface-container-low": "#eff4ff", "primary": "#006b2c", "on-primary": "#ffffff",
            "surface": "#f8f9ff", "surface-container-lowest": "#ffffff", "outline-variant": "#bdcaba",
            "background": "#f8f9ff", "on-background": "#0b1c30", "error": "#ba1a1a", "error-container": "#ffdad6",
            "on-error-container": "#93000a", "tertiary": "#595c5e"
          },
          "borderRadius": { "DEFAULT": "0.5rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
          "spacing": { "xl": "32px", "gutter": "16px", "container-max": "1280px", "md": "16px", "xs": "4px", "lg": "24px", "sm": "8px" },
          "fontFamily": { "headline-lg-mobile": ["Inter"], "headline-md": ["Inter"], "label-md": ["Inter"], "body-md": ["Inter"], "label-sm": ["Inter"] },
          "fontSize": {
            "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
            "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
            "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}]
          }
        }}
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .type-card { transition: all 0.15s ease; cursor: pointer; }
        .type-card:hover { border-color: #006b2c; box-shadow: 0 0 0 3px rgba(0,107,44,0.08); }
        .type-locked { opacity: 0.55; cursor: not-allowed; }
        .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-16">
<header class="fixed top-0 left-0 w-full z-50 flex items-center gap-sm px-md h-16 shadow-sm bg-surface">
<a class="material-symbols-outlined text-primary hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95" href="sel.html">arrow_back</a>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Choose Product Type</span>
</header>

<main class="mt-20 px-md max-w-[880px] mx-auto space-y-lg">
<div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-xs">Select a product type to proceed</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Uploads are image-only — no video files. Free plan allows up to 5 listings.</p>
</div>

<div id="limit_notice" class="hidden p-md bg-error-container rounded-lg">
<p class="font-label-md text-label-md text-on-error-container" id="limit_notice_text"></p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-md" id="type_grid"></div>
</main>

<script>
    const SUPABASE_URL = "https://wexvdmimqqiwarvswwbi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHZkbWltcXFpd2FydnN3d2JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4OTUzNjgsImV4cCI6MjA5ODQ3MTM2OH0.qwVb9IfUgqGsvt8nm-zINQrCtJjzmio8mWgxOWJCgZQ";
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const PRODUCT_TYPES = [
        { id: 'digital', icon: 'auto_stories', name: 'Digital Product', desc: "Ebooks, templates, printables, and more that customers access instantly.", badge: null },
        { id: 'physical', icon: 'inventory_2', name: 'Physical Product', desc: "Fashion, beauty items, accessories, and more, with shipping details collected at checkout.", badge: null },
        { id: 'service', icon: 'design_services', name: 'Service', desc: "Coaching, consulting, design, counseling, and more — get paid for your expertise.", badge: null },
        { id: 'subscription', icon: 'autorenew', name: 'Subscription', desc: "Recurring payment subscriptions for your product or service.", badge: 'Pro' },
        { id: 'ticket_masterclass', icon: 'confirmation_number', name: 'Ticket & Masterclass', desc: "Sell tickets for events, webinars, masterclasses, and workshops.", badge: null },
        { id: 'bookings', icon: 'event_available', name: 'Bookings', desc: "Consultations and coaching sessions with automated scheduling.", badge: 'New' },
        { id: 'course', icon: 'school', name: 'Course', desc: "Video, audio, and interactive lessons learners can watch or download.", badge: 'New' },
        { id: 'bundle', icon: 'inventory', name: 'Bundle', desc: "Tiered bundles, each with its own price, description, and access.", badge: 'Turbo' },
        { id: 'membership_course', icon: 'workspace_premium', name: 'Membership Course', desc: "Ongoing access to exclusive content while a subscription is active.", badge: 'Pro' },
        { id: 'stream', icon: 'play_circle', name: 'Stream (online only)', desc: "A single secure, non-downloadable video or audio file.", badge: 'Pro' },
        { id: 'flexible_subscription', icon: 'payments', name: 'Flexible Subscription', desc: "High-ticket products with a flexible first payment and installments.", badge: null },
    ];

    async function init() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { window.location.href = 'signup.html'; return; }

        const { data: store } = await supabaseClient
            .from('stores')
            .select('id, plan')
            .eq('seller_id', user.id)
            .maybeSingle();

        if (!store) {
            document.getElementById('limit_notice_text').textContent = 'Set up your store in Store Settings before adding products.';
            document.getElementById('limit_notice').classList.remove('hidden');
            return;
        }

        const limits = { free: 5, pro: 30, gold: 100 };
        const limit = limits[store.plan] || 5;

        const { count } = await supabaseClient
            .from('products')
            .select('id', { count: 'exact', head: true })
            .eq('store_id', store.id)
            .neq('status', 'archived');

        const atLimit = (count || 0) >= limit;
        if (atLimit) {
            document.getElementById('limit_notice_text').textContent =
                `You've used ${count}/${limit} listings on your ${store.plan} plan. Upgrade to add more products.`;
            document.getElementById('limit_notice').classList.remove('hidden');
        }

        const grid = document.getElementById('type_grid');
        grid.innerHTML = PRODUCT_TYPES.map(t => `
            <div class="type-card ${atLimit ? 'type-locked' : ''} section-card bg-white border border-outline-variant/40 rounded-xl p-lg flex gap-md" data-type="${t.id}">
                <span class="material-symbols-outlined text-primary text-3xl flex-shrink-0">${t.icon}</span>
                <div>
                    <div class="flex items-center gap-xs mb-xs">
                        <span class="font-label-md text-label-md text-on-surface font-bold">${t.name}</span>
                        ${t.badge ? `<span class="badge bg-primary/10 text-primary">${t.badge}</span>` : ''}
                    </div>
                    <p class="text-label-sm text-on-surface-variant leading-snug">${t.desc}</p>
                </div>
            </div>
        `).join('');

        if (!atLimit) {
            document.querySelectorAll('.type-card').forEach(card => {
                card.addEventListener('click', () => {
                    window.location.href = `add-product.html?type=${card.getAttribute('data-type')}`;
                });
            });
        } else {
            document.querySelectorAll('.type-card').forEach(card => {
                card.addEventListener('click', () => { window.location.href = 'upgrade-plan.html'; });
            });
        }
    }

    init();
</script>
</body></html>
