<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Settings | Mega Mart</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script id="tailwind-config">
      tailwind.config = { darkMode: "class", theme: { extend: {
        "colors": {
          "on-surface-variant": "#3e4a3d", "surface-container": "#e5eeff", "on-surface": "#0b1c30",
          "surface-container-low": "#eff4ff", "primary": "#006b2c", "on-primary": "#ffffff",
          "surface": "#f8f9ff", "surface-container-lowest": "#ffffff", "outline-variant": "#bdcaba",
          "background": "#f8f9ff", "on-background": "#0b1c30", "error": "#ba1a1a", "error-container": "#ffdad6",
          "on-error-container": "#93000a", "tertiary": "#595c5e"
        },
        "borderRadius": { "DEFAULT": "0.5rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        "spacing": { "xl": "32px", "md": "16px", "xs": "4px", "lg": "24px", "sm": "8px" },
        "fontFamily": { "headline-lg-mobile": ["Inter"], "headline-md": ["Inter"], "label-md": ["Inter"], "body-md": ["Inter"] },
        "fontSize": {
          "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
          "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
          "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
          "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
        }
      }}}
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .input-focus:focus { outline: none; border-color: #006b2c; box-shadow: 0 0 0 3px rgba(0,107,44,0.15); }
        .section-card { background: #fff; border: 1px solid #e5eeff; border-radius: 12px; }
        #toast { display: none; } #toast.active { display: flex; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-24">
<header class="fixed top-0 left-0 w-full z-50 flex items-center gap-sm px-md h-16 shadow-sm bg-surface">
<a class="material-symbols-outlined text-primary hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95" href="sel.html">arrow_back</a>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Payout / Bank Settings</span>
</header>

<main class="mt-20 px-md max-w-[520px] mx-auto space-y-lg">
<div class="hidden p-md bg-error-container rounded-lg" id="form_error"><p class="font-label-md text-label-md text-on-error-container" id="form_error_text"></p></div>

<section class="section-card p-lg space-y-md">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">General Payout Settings</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Modify your payout settings.</p>
</div>

<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant">Payout Schedule</label>
<div class="flex gap-md">
<label class="flex items-center gap-xs cursor-pointer">
<input checked="" class="w-4 h-4 text-primary" id="schedule_auto" name="payout_schedule" type="radio" value="automatic"/>
<span class="font-label-md text-label-md">Automatic</span>
</label>
<label class="flex items-center gap-xs cursor-pointer">
<input class="w-4 h-4 text-primary" id="schedule_manual" name="payout_schedule" type="radio" value="manual"/>
<span class="font-label-md text-label-md">Manual</span>
</label>
</div>
<p class="text-label-sm text-on-surface-variant">Payouts settle to your Mega Mart wallet — withdraw any time from your wallet page.</p>
</div>

<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="currency">Currency</label>
<select class="w-full h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="currency">
<option value="NGN">NGN — Nigerian Naira</option>
</select>
</div>

<div class="pt-sm space-y-md">
<h3 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wide">Where we'll send your money</h3>
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="bank_name">Bank Name</label>
<input class="w-full h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="bank_name" placeholder="e.g. GTBank" type="text"/>
</div>
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="bank_account_number">Account Number</label>
<input class="w-full h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="bank_account_number" maxlength="10" placeholder="0123456789" type="text"/>
</div>
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="bank_account_name">Account Name</label>
<input class="w-full h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="bank_account_name" placeholder="Must match your bank records" type="text"/>
</div>
</div>
</section>

<button class="w-full h-[52px] bg-primary text-on-primary font-headline-md text-headline-md rounded-lg shadow-sm active:scale-[0.98] transition-all" id="save_btn" type="button">Save Payout Settings</button>
</main>

<div class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-[#213145] text-white px-lg py-sm rounded-full shadow-xl items-center gap-sm z-50" id="toast">
<span class="material-symbols-outlined text-[#7ffc97]">check_circle</span><span class="font-label-md text-label-md">Payout settings saved</span>
</div>

<script>
    const SUPABASE_URL = "https://wexvdmimqqiwarvswwbi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHZkbWltcXFpd2FydnN3d2JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4OTUzNjgsImV4cCI6MjA5ODQ3MTM2OH0.qwVb9IfUgqGsvt8nm-zINQrCtJjzmio8mWgxOWJCgZQ";
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    function showError(msg) {
        document.getElementById('form_error_text').textContent = msg;
        document.getElementById('form_error').classList.remove('hidden');
    }
    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2500);
    }

    async function loadSettings() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { window.location.href = 'signup.html'; return; }
        currentUser = user;

        const { data, error } = await supabaseClient.from('payout_settings').select('*').eq('seller_id', user.id).maybeSingle();
        if (error) { showError('Could not load payout settings: ' + error.message); return; }
        if (data) {
            if (data.payout_schedule === 'manual') document.getElementById('schedule_manual').checked = true;
            if (data.bank_name) document.getElementById('bank_name').value = data.bank_name;
            if (data.bank_account_number) document.getElementById('bank_account_number').value = data.bank_account_number;
            if (data.bank_account_name) document.getElementById('bank_account_name').value = data.bank_account_name;
        }
    }

    async function saveSettings() {
        const btn = document.getElementById('save_btn');
        btn.disabled = true; btn.textContent = 'Saving...';

        const payload = {
            seller_id: currentUser.id,
            payout_schedule: document.getElementById('schedule_manual').checked ? 'manual' : 'automatic',
            currency: document.getElementById('currency').value,
            bank_name: document.getElementById('bank_name').value.trim() || null,
            bank_account_number: document.getElementById('bank_account_number').value.trim() || null,
            bank_account_name: document.getElementById('bank_account_name').value.trim() || null,
        };

        const { error } = await supabaseClient.from('payout_settings').upsert(payload, { onConflict: 'seller_id' });
        btn.disabled = false; btn.textContent = 'Save Payout Settings';

        if (error) { showError('Could not save: ' + error.message); return; }
        showToast();
    }

    document.getElementById('save_btn').addEventListener('click', saveSettings);
    loadSettings();
</script>
</body></html>
