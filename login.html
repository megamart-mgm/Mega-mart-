<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Top AppBar (Simplified for Login Context) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-center items-center px-md h-16 bg-surface shadow-sm">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Mega Mart</h1>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-gutter pt-20 pb-12">
<!-- Login Container -->
<div class="w-full max-w-[420px] fade-in">
<div class="bg-surface-container-lowest p-xl rounded-xl login-card border border-outline-variant/30">
<div class="mb-lg text-center">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Welcome back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Please enter your details to sign in.</p>
</div>
<form class="space-y-md" id="loginForm">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-body-lg">mail</span>
<input class="w-full pl-11 pr-md py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-on-surface input-focus-ring transition-all placeholder:text-on-secondary-container/50" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-body-lg">lock</span>
<input class="w-full pl-11 pr-11 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-on-surface input-focus-ring transition-all placeholder:text-on-secondary-container/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-sm pt-xs">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="remember">Remember me for 30 days</label>
</div>
<!-- Login Button -->
<button class="w-full h-[48px] bg-primary-container text-on-primary-container font-headline-md text-headline-md rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-md" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-xl">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm uppercase">
<span class="bg-surface-container-lowest px-md text-on-surface-variant">Or continue with</span>
</div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm py-2 px-md border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors active:scale-95">

<span class="font-label-md">Google</span>
</button>
<button class="flex items-center justify-center gap-sm py-2 px-md border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors active:scale-95">
<svg class="w-5 h-5 text-on-surface" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.341-3.369-1.341-.454-1.152-1.11-1.459-1.11-1.459-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482C19.137 20.164 22 16.418 22 12c0-5.523-4.477-10-10-10z"></path>
</svg>
<span class="font-label-md">GitHub</span>
</button>
</div>
<!-- Signup Redirect -->
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline transition-all ml-xs" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Additional Links / Footer -->
<div class="mt-md flex justify-between px-xs">

</main>
<!-- Bottom Nav Suppression Check: Since this is a task-focused Transactional page (Login), the BottomNavBar is excluded per requirements -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }

        // Form handling simulation
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> <span>Signing in...</span>';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> <span>Success!</span>';
                btn.classList.replace('bg-primary-container', 'bg-green-600');
                
                // Simulate redirect
                setTimeout(() => {
                    alert('Login successful! Redirecting to Mega Mart dashboard...');
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-green-600', 'bg-primary-container');
                }, 1000);
            }, 1500);
        });

        // Subtle parallax mouse effect on background
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            document.body.style.background = `radial-gradient(circle at ${x * 100}% ${y * 100}%, #ffffff 0%, #f8f9ff 100%)`;
        });
    </script>
</body></html>
