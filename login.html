<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Log In | Mega Mart</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff; }
        .input-focus-ring:focus { outline: none; border-color: #006b2c; box-shadow: 0 0 0 3px rgba(0, 107, 44, 0.15); }
        #form_error { display: none; } #form_error.active { display: block; }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col">
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-4 h-16 bg-white shadow-sm">
<span class="material-symbols-outlined text-[#006b2c]">storefront</span>
<span class="font-bold text-[#006b2c] text-xl ml-2">Mega Mart</span>
</header>

<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4">
<div class="w-full max-w-[420px] bg-white rounded-xl shadow-sm p-8 border border-[#e5eeff]">
<h1 class="text-2xl font-bold text-[#0b1c30] mb-1">Welcome back</h1>
<p class="text-[#3e4a3d] mb-6">Log in to your Mega Mart account.</p>

<div class="mb-4 p-3 bg-[#ffdad6] rounded-lg" id="form_error">
<p class="text-sm text-[#93000a]" id="form_error_text"></p>
</div>

<form class="space-y-4" id="login_form">
<div>
<label class="block text-sm font-medium text-[#3e4a3d] mb-1" for="email">Email Address</label>
<input class="w-full h-12 px-4 bg-white border border-[#E2E8F0] rounded-lg input-focus-ring" id="email" placeholder="name@example.com" required="" type="email"/>
</div>
<div>
<div class="flex justify-between items-center mb-1">
<label class="block text-sm font-medium text-[#3e4a3d]" for="password">Password</label>
<a class="text-sm text-[#006b2c] font-medium hover:underline" href="forgot-password.html">Forgot password?</a>
</div>
<input class="w-full h-12 px-4 bg-white border border-[#E2E8F0] rounded-lg input-focus-ring" id="password" placeholder="••••••••" required="" type="password"/>
</div>
<button class="w-full h-12 bg-[#006b2c] text-white font-bold rounded-lg shadow-sm hover:brightness-95 active:scale-[0.98] transition-all disabled:opacity-60" id="submit_btn" type="submit">
                Log In
            </button>
</form>

<div class="mt-6 text-center text-sm text-[#3e4a3d]">
                Don't have an account? <a class="text-[#006b2c] font-bold hover:underline" href="signup.html">Sign Up</a>
</div>
</div>
</main>

<script>
    const SUPABASE_URL = "https://wexvdmimqqiwarvswwbi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHZkbWltcXFpd2FydnN3d2JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4OTUzNjgsImV4cCI6MjA5ODQ3MTM2OH0.qwVb9IfUgqGsvt8nm-zINQrCtJjzmio8mWgxOWJCgZQ";
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('login_form');
    const submitBtn = document.getElementById('submit_btn');

    function showError(msg) {
        document.getElementById('form_error_text').textContent = msg;
        document.getElementById('form_error').classList.add('active');
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        document.getElementById('form_error').classList.remove('active');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in...';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
            showError(error.message);
            submitBtn.disabled = false;
            submitBtn.textContent = 'Log In';
            return;
        }

        const { data: profile, error: profileErr } = await supabaseClient
            .from('profiles')
            .select('role, first_name, delivery_address')
            .eq('id', data.user.id)
            .maybeSingle();

        if (profileErr || !profile) {
            showError('Logged in, but could not load your profile. Please try again.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Log In';
            return;
        }

        if (profile.role === 'seller') {
            window.location.href = 'sel.html';
        } else {
            // Buyer — if profile looks incomplete, send them to complete it first
            if (!profile.first_name || !profile.delivery_address) {
                window.location.href = 'profile-settings.html';
            } else {
                window.location.href = 'store.html';
            }
        }
    });
</script>
</body></html>
