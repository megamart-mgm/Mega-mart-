<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile Settings | Mega Mart</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script id="tailwind-config">
      tailwind.config = { darkMode: "class", theme: { extend: {
        "colors": {
          "on-surface-variant": "#3e4a3d", "surface-container": "#e5eeff", "on-surface": "#0b1c30",
          "surface-container-low": "#eff4ff", "primary": "#006b2c", "on-primary": "#ffffff",
          "surface": "#f8f9ff", "surface-container-lowest": "#ffffff", "outline-variant": "#bdcaba",
          "background": "#f8f9ff", "on-background": "#0b1c30", "error": "#ba1a1a", "error-container": "#ffdad6",
          "on-error-container": "#93000a", "tertiary": "#595c5e"
        },
        "borderRadius": { "DEFAULT": "0.5rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        "spacing": { "xl": "32px", "md": "16px", "xs": "4px", "lg": "24px", "sm": "8px" },
        "fontFamily": { "headline-lg-mobile": ["Inter"], "headline-md": ["Inter"], "label-md": ["Inter"], "body-md": ["Inter"] },
        "fontSize": {
          "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
          "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
          "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
          "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
        }
      }}}
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .input-focus:focus { outline: none; border-color: #006b2c; box-shadow: 0 0 0 3px rgba(0,107,44,0.15); }
        .section-card { background: #fff; border: 1px solid #e5eeff; border-radius: 12px; }
        #toast { display: none; }
        #toast.active { display: flex; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-24">
<header class="fixed top-0 left-0 w-full z-50 flex items-center gap-sm px-md h-16 shadow-sm bg-surface">
<a class="material-symbols-outlined text-primary hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95" href="#" id="back_link">arrow_back</a>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Profile Settings</span>
</header>

<main class="mt-20 px-md max-w-[560px] mx-auto space-y-lg">

<div class="hidden p-md bg-error-container rounded-lg" id="form_error"><p class="font-label-md text-label-md text-on-error-container" id="form_error_text"></p></div>

<section class="section-card p-lg space-y-md">
<div class="flex items-center gap-md">
<div class="w-20 h-20 rounded-full bg-surface-container-high overflow-hidden flex items-center justify-center flex-shrink-0" id="avatar_preview">
<span class="material-symbols-outlined text-tertiary text-3xl">person</span>
</div>
<div>
<button class="bg-primary text-on-primary px-md py-xs rounded-lg text-sm font-bold" id="upload_avatar_btn" type="button">Upload Photo</button>
<input accept="image/*" class="hidden" id="avatar_input" type="file"/>
<p class="text-label-sm text-on-surface-variant mt-xs">JPG or PNG, under 5MB</p>
</div>
</div>
</section>

<section class="section-card p-lg space-y-md">
<h2 class="font-headline-md text-headline-md text-on-surface">Basic Info</h2>
<div class="grid grid-cols-2 gap-sm">
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="first_name">First Name</label>
<input class="w-full h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="first_name" type="text"/>
</div>
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="last_name">Last Name</label>
<input class="w-full h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="last_name" type="text"/>
</div>
</div>
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="contact_phone">Phone Number</label>
<input class="w-full h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="contact_phone" placeholder="+234..." type="tel"/>
</div>

<!-- Buyer-only -->
<div class="space-y-xs hidden" id="delivery_address_wrap">
<label class="block font-label-md text-label-md text-on-surface-variant" for="delivery_address">Delivery Address</label>
<textarea class="w-full px-3 py-2 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="delivery_address" placeholder="Street, city, state" rows="2"></textarea>
</div>

<!-- Seller-only -->
<div id="seller_fields" class="hidden space-y-md">
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="gender">Gender</label>
<select class="w-full h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="gender">
<option value="">Select</option>
<option value="female">Female</option>
<option value="male">Male</option>
<option value="nonbinary">Nonbinary</option>
<option value="prefer_not_to_say">Prefer not to say</option>
</select>
</div>
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="date_of_birth">Date of Birth</label>
<input class="w-full h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="date_of_birth" type="date"/>
</div>
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="creator_type">Creator Type</label>
<select class="w-full h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="creator_type">
<option value="individual">Individual</option>
<option value="business">Business (Registered)</option>
</select>
</div>
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="profile_description">Bio / Description</label>
<textarea class="w-full px-3 py-2 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="profile_description" rows="3"></textarea>
</div>
<div class="grid grid-cols-2 gap-sm">
<input class="h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="twitter_username" placeholder="Twitter/X" type="text"/>
<input class="h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="instagram_username" placeholder="Instagram" type="text"/>
<input class="h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="facebook_url" placeholder="Facebook" type="text"/>
<input class="h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="tiktok_username" placeholder="TikTok" type="text"/>
<input class="h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="linkedin_url" placeholder="LinkedIn" type="text"/>
<input class="h-11 px-3 bg-white border border-[#E2E8F0] rounded-lg input-focus font-body-md text-body-md" id="youtube_username" placeholder="YouTube" type="text"/>
</div>
</div>
</section>

<button class="w-full h-[52px] bg-primary text-on-primary font-headline-md text-headline-md rounded-lg shadow-sm active:scale-[0.98] transition-all" id="save_btn" type="button">Save Profile</button>
</main>

<div class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-[#213145] text-white px-lg py-sm rounded-full shadow-xl items-center gap-sm z-50" id="toast">
<span class="material-symbols-outlined text-[#7ffc97]">check_circle</span><span class="font-label-md text-label-md">Profile saved</span>
</div>

<script>
    const SUPABASE_URL = "https://wexvdmimqqiwarvswwbi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHZkbWltcXFpd2FydnN3d2JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4OTUzNjgsImV4cCI6MjA5ODQ3MTM2OH0.qwVb9IfUgqGsvt8nm-zINQrCtJjzmio8mWgxOWJCgZQ";
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let userRole = 'client';
    let avatarFile = null;

    function showError(msg) {
        document.getElementById('form_error_text').textContent = msg;
        document.getElementById('form_error').classList.remove('hidden');
    }
    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2500);
    }

    document.getElementById('upload_avatar_btn').addEventListener('click', () => document.getElementById('avatar_input').click());
    document.getElementById('avatar_input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) { showError('Please choose an image file.'); return; }
        if (file.size > 5 * 1024 * 1024) { showError('Image must be under 5MB.'); return; }
        avatarFile = file;
        document.getElementById('avatar_preview').innerHTML = `<img src="${URL.createObjectURL(file)}" class="w-full h-full object-cover" />`;
    });

    async function loadProfile() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { window.location.href = 'signup.html'; return; }
        currentUser = user;

        const { data: profile, error } = await supabaseClient.from('profiles').select('*').eq('id', user.id).maybeSingle();
        if (error || !profile) { showError('Could not load your profile.'); return; }

        userRole = profile.role || 'client';
        document.getElementById('back_link').setAttribute('href', userRole === 'seller' ? 'sel.html' : 'store.html');

        if (userRole === 'seller') {
            document.getElementById('seller_fields').classList.remove('hidden');
        } else {
            document.getElementById('delivery_address_wrap').classList.remove('hidden');
        }

        const fieldMap = {
            first_name: 'first_name', last_name: 'last_name', contact_phone: 'contact_phone',
            delivery_address: 'delivery_address', gender: 'gender', date_of_birth: 'date_of_birth',
            creator_type: 'creator_type', profile_description: 'profile_description',
            twitter_username: 'twitter_username', instagram_username: 'instagram_username',
            facebook_url: 'facebook_url', tiktok_username: 'tiktok_username',
            linkedin_url: 'linkedin_url', youtube_username: 'youtube_username'
        };
        Object.entries(fieldMap).forEach(([elId, col]) => {
            const el = document.getElementById(elId);
            if (el && profile[col]) el.value = profile[col];
        });

        if (profile.avatar_url) {
            document.getElementById('avatar_preview').innerHTML = `<img src="${profile.avatar_url}" class="w-full h-full object-cover" />`;
        }
    }

    async function saveProfile() {
        const saveBtn = document.getElementById('save_btn');
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';

        try {
            let avatarUrl = null;
            if (avatarFile) {
                const ext = avatarFile.name.split('.').pop();
                const path = `${currentUser.id}/avatar.${ext}`;
                const { error: upErr } = await supabaseClient.storage.from('avatars').upload(path, avatarFile, { upsert: true });
                if (upErr) throw new Error('Photo upload failed: ' + upErr.message);
                const { data: pub } = supabaseClient.storage.from('avatars').getPublicUrl(path);
                avatarUrl = pub.publicUrl + '?t=' + Date.now();
            }

            const payload = {
                first_name: document.getElementById('first_name').value.trim() || null,
                last_name: document.getElementById('last_name').value.trim() || null,
                contact_phone: document.getElementById('contact_phone').value.trim() || null,
            };
            if (userRole === 'client') {
                payload.delivery_address = document.getElementById('delivery_address').value.trim() || null;
            } else {
                payload.gender = document.getElementById('gender').value || null;
                payload.date_of_birth = document.getElementById('date_of_birth').value || null;
                payload.creator_type = document.getElementById('creator_type').value || null;
                payload.profile_description = document.getElementById('profile_description').value.trim() || null;
                payload.twitter_username = document.getElementById('twitter_username').value.trim() || null;
                payload.instagram_username = document.getElementById('instagram_username').value.trim() || null;
                payload.facebook_url = document.getElementById('facebook_url').value.trim() || null;
                payload.tiktok_username = document.getElementById('tiktok_username').value.trim() || null;
                payload.linkedin_url = document.getElementById('linkedin_url').value.trim() || null;
                payload.youtube_username = document.getElementById('youtube_username').value.trim() || null;
            }
            if (avatarUrl) payload.avatar_url = avatarUrl;
            payload.full_name = `${payload.first_name || ''} ${payload.last_name || ''}`.trim() || null;

            const { error } = await supabaseClient.from('profiles').update(payload).eq('id', currentUser.id);
            if (error) throw new Error(error.message);

            showToast();
        } catch (err) {
            showError(err.message);
        } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save Profile';
        }
    }

    document.getElementById('save_btn').addEventListener('click', saveProfile);
    loadProfile();
</script>
</body></html>
