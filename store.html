<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

<body class="bg-surface text-on-surface font-body-md">
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-md h-16 shadow-sm bg-surface">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary tracking-tight">Mega Mart</h1>
<div class="flex items-center gap-sm">
<div class="relative hidden" id="notif_bell_wrap">
<button class="material-symbols-outlined text-primary hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 relative" id="notif_bell_btn">
notifications
<span class="hidden absolute -top-0.5 -right-0.5 bg-error text-on-error text-[10px] font-bold min-w-[18px] h-[18px] rounded-full items-center justify-center px-1" id="notif_bell_badge"></span>
</button>
<div class="hidden absolute right-0 mt-2 w-80 max-w-[85vw] bg-white rounded-xl shadow-xl border border-outline-variant/20 max-h-[70vh] overflow-y-auto z-[70]" id="notif_dropdown">
<p class="p-md text-center text-on-surface-variant text-sm hidden" id="notif_dropdown_empty">You're all caught up.</p>
<div id="notif_dropdown_list"></div>
</div>
</div>
<a class="text-primary text-label-md font-bold hover:underline" href="login.html">Log In</a>
</div>
</header>

<main class="pt-20 pb-16 max-w-container-max mx-auto px-md">

<div class="mb-md hidden" id="announcement_banner">
<div class="bg-primary-container/10 border border-primary/20 rounded-xl p-md flex items-start gap-sm">
<span class="material-symbols-outlined text-primary">campaign</span>
<div>
<p class="font-label-md text-label-md text-on-surface font-bold" id="announcement_title"></p>
<p class="text-label-sm text-on-surface-variant" id="announcement_body"></p>
</div>
</div>
</div>

<div class="mb-lg">
<div class="relative group">
<input class="w-full h-12 bg-surface-container-low border border-outline-variant rounded-xl px-12 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-body-md" id="search_input" placeholder="Search for products, services and more..." type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary">search</span>
</div>
</div>

<div class="mb-lg flex gap-sm overflow-x-auto hide-scrollbar pb-1" id="category_bar"></div>

<section>
<div class="flex justify-between items-end mb-md">
<h2 class="font-headline-md text-headline-md text-on-surface">All Products</h2>
<span class="text-label-sm text-on-surface-variant" id="product_count"></span>
</div>
<div class="grid grid-cols-2 lg:grid-cols-5 gap-md" id="product_grid">
<p class="col-span-full text-on-surface-variant">Loading products...</p>
</div>

<div class="flex justify-center items-center gap-md mt-lg" id="pagination_bar">
<button class="w-10 h-10 rounded-full bg-surface-container-low text-on-surface flex items-center justify-center disabled:opacity-40" id="prev_page_btn">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<span class="text-label-sm text-on-surface-variant" id="page_indicator">Page 1</span>
<button class="w-10 h-10 rounded-full bg-primary text-on-primary flex items-center justify-center disabled:opacity-40" id="next_page_btn">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>

<footer class="mt-2xl pt-lg border-t border-outline-variant/30 text-center text-label-sm text-on-surface-variant space-y-2">

<a class="hover:text-primary hover:underline" href="policies.html">Store Policies</a>
</div>
<p>© 2026 Mega Mart. All rights reserved.</p>
</footer>

</main>

<script>
    const SUPABASE_URL = "https://wexvdmimqqiwarvswwbi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHZkbWltcXFpd2FydnN3d2JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4OTUzNjgsImV4cCI6MjA5ODQ3MTM2OH0.qwVb9IfUgqGsvt8nm-zINQrCtJjzmio8mWgxOWJCgZQ";
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allProducts = [];
    let filteredProducts = [];
    let currentPage = 0;
    let selectedCategory = 'all';
    const PAGE_SIZE = 30;

    function formatPrice(p) {
        if (p.product_type === 'service' && p.pricing_tiers && p.pricing_tiers.length) {
            const min = Math.min(...p.pricing_tiers.map(t => t.price));
            return `From ₦${min.toLocaleString()}`;
        }
        return `₦${Number(p.price).toLocaleString()}`;
    }

    // Presence heartbeat — lets other people see this user as "online".
    // Anyone logged in gets marked active every 60s while this tab is open.
    async function heartbeat() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) await supabaseClient.from('profiles').update({ last_seen_at: new Date().toISOString() }).eq('id', user.id);
    }
    heartbeat();
    setInterval(heartbeat, 60000);

    async function isSellerOnline(sellerId) {
        const { data } = await supabaseClient.from('profiles').select('last_seen_at').eq('id', sellerId).maybeSingle();
        if (!data || !data.last_seen_at) return false;
        return (Date.now() - new Date(data.last_seen_at).getTime()) < 2 * 60 * 1000; // active in the last 2 minutes
    }

    function renderStars(avg) {
        const rounded = Math.round(avg || 0);
        return '★'.repeat(rounded) + '☆'.repeat(5 - rounded);
    }

    async function attachRatings(products) {
        const productIds = products.map(p => p.id);
        const storeIds = [...new Set(products.map(p => p.store_id))];
        if (productIds.length === 0) return products;

        const { data: productRatings } = await supabaseClient
            .from('product_rating_summary').select('*').in('product_id', productIds);
        const { data: storeRatings } = await supabaseClient
            .from('store_rating_summary').select('*').in('store_id', storeIds);

        const prMap = {};
        (productRatings || []).forEach(r => { prMap[r.product_id] = r; });
        const srMap = {};
        (storeRatings || []).forEach(r => { srMap[r.store_id] = r; });

        products.forEach(p => {
            const pr = prMap[p.id];
            p.avg_rating = pr ? Number(pr.avg_rating) : 0;
            p.review_count = pr ? pr.review_count : 0;
            const sr = srMap[p.store_id];
            p.store_avg_rating = sr ? Number(sr.avg_rating) : 0;
            p.store_review_count = sr ? sr.review_count : 0;
        });
        return products;
    }

    function renderCategoryBar() {
        // Group categories case/whitespace-insensitively so "Website Development"
        // and "website development" don't show up as two separate chips.
        const normToDisplay = {};
        allProducts.forEach(p => {
            if (!p.category) return;
            const norm = p.category.trim().toLowerCase();
            if (!normToDisplay[norm]) normToDisplay[norm] = p.category.trim();
        });
        const cats = Object.values(normToDisplay);

        const bar = document.getElementById('category_bar');
        const chips = ['all', ...cats];
        bar.innerHTML = chips.map(c => `
            <button class="flex-shrink-0 px-4 py-2 rounded-full text-sm font-bold border cat-chip ${selectedCategory.toLowerCase() === c.toLowerCase() ? 'bg-primary text-on-primary border-primary' : 'bg-white text-on-surface-variant border-outline-variant'}" data-cat="${c}">
                ${c === 'all' ? 'All' : c}
            </button>
        `).join('');
        bar.querySelectorAll('.cat-chip').forEach(btn => {
            btn.addEventListener('click', () => {
                selectedCategory = btn.getAttribute('data-cat');
                applyFilters();
            });
        });
    }

    function applyFilters() {
        const q = document.getElementById('search_input').value.toLowerCase();
        filteredProducts = allProducts.filter(p => {
            const matchesCategory = selectedCategory === 'all' ||
                (p.category && p.category.trim().toLowerCase() === selectedCategory.trim().toLowerCase());
            const matchesSearch = !q ||
                p.name.toLowerCase().includes(q) ||
                (p.category || '').toLowerCase().includes(q) ||
                (p.store_name || '').toLowerCase().includes(q);
            return matchesCategory && matchesSearch;
        });
        currentPage = 0;
        renderCategoryBar();
        renderPage();
    }

    function renderPage() {
        document.getElementById('product_count').textContent = `${filteredProducts.length} products`;
        const start = currentPage * PAGE_SIZE;
        const pageItems = filteredProducts.slice(start, start + PAGE_SIZE);
        renderGrid(pageItems);

        const totalPages = Math.max(1, Math.ceil(filteredProducts.length / PAGE_SIZE));
        document.getElementById('page_indicator').textContent = `Page ${currentPage + 1} of ${totalPages}`;
        document.getElementById('prev_page_btn').disabled = currentPage === 0;
        document.getElementById('next_page_btn').disabled = currentPage >= totalPages - 1;
        document.getElementById('pagination_bar').style.display = filteredProducts.length > PAGE_SIZE ? 'flex' : 'none';

        pageItems.forEach(p => supabaseClient.rpc('track_impression', { p_product_id: p.id }));
    }

    document.getElementById('prev_page_btn').addEventListener('click', () => {
        if (currentPage > 0) { currentPage--; renderPage(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    });
    document.getElementById('next_page_btn').addEventListener('click', () => {
        const totalPages = Math.ceil(filteredProducts.length / PAGE_SIZE);
        if (currentPage < totalPages - 1) { currentPage++; renderPage(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    });

    function renderGrid(products) {
        const grid = document.getElementById('product_grid');

        if (products.length === 0) {
            grid.innerHTML = '<p class="col-span-full text-on-surface-variant">No products found.</p>';
            return;
        }

        grid.innerHTML = products.map(p => `
            <div class="product-card bg-surface-container-lowest rounded-xl p-sm shadow-[0_1px_3px_0_rgba(0,0,0,0.05)] flex flex-col" id="product-${p.id}" data-product-id="${p.id}">
                <div class="relative aspect-square rounded-lg overflow-hidden bg-surface-container mb-sm">
                    ${p.image_urls && p.image_urls[0] ? `<img class="w-full h-full object-cover" src="${p.image_urls[0]}" />` : '<div class="w-full h-full flex items-center justify-center text-on-surface-variant"><span class="material-symbols-outlined">image</span></div>'}
                    ${p.plan !== 'free' ? `<span class="absolute top-2 left-2 bg-primary text-on-primary badge-approved">${p.plan.toUpperCase()}</span>` : ''}
                </div>
                <h3 class="font-label-md text-on-surface line-clamp-1 mb-xs">${p.name}</h3>
                <div class="flex items-center gap-1 mb-xs">
                    <div class="w-5 h-5 rounded-full bg-surface-container-high overflow-hidden flex-shrink-0 flex items-center justify-center">
                        ${p.store_logo_url ? `<img src="${p.store_logo_url}" class="w-full h-full object-cover" />` : '<span class="material-symbols-outlined text-[12px] text-tertiary">storefront</span>'}
                    </div>
                    <p class="text-label-sm text-on-surface-variant truncate">${p.store_name || ''}</p>
                    ${p.store_is_verified ? '<span class="material-symbols-outlined text-primary text-[14px]" title="Verified Seller" style="font-variation-settings: \'FILL\' 1;">verified</span>' : ''}
                </div>
                ${p.review_count > 0 ? `
                <div class="flex items-center gap-1 mb-xs">
                    <span class="text-yellow-500 text-xs leading-none">${renderStars(p.avg_rating)}</span>
                    <span class="text-[10px] text-on-surface-variant">${p.avg_rating} (${p.review_count})</span>
                </div>` : ''}
                <div class="flex justify-between items-center mt-auto pt-xs">
                    <span class="font-headline-md text-primary text-base">${formatPrice(p)}</span>
                </div>
                <button class="w-full h-10 mt-sm bg-primary text-on-primary rounded-lg text-sm font-bold flex items-center justify-center gap-1 contact-seller-btn" data-id="${p.id}">
                    <span class="material-symbols-outlined text-base">chat</span> Contact Seller
                </button>
            </div>
        `).join('');

        // Clicking anywhere on the card opens the full product page
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.closest('.contact-seller-btn')) return;
                window.location.href = 'pro.html?id=' + card.getAttribute('data-product-id');
            });
        });

        // Contact Seller jumps straight into an in-site chat with them
        document.querySelectorAll('.contact-seller-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                contactSeller(btn.getAttribute('data-id'));
            });
        });

        const params = new URLSearchParams(window.location.search);
        const highlightId = params.get('product');
        if (highlightId) {
            const el = document.getElementById('product-' + highlightId);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.add('highlight');
            }
        }
    }

    // ---------------------------------------------------------------
    // Contact Seller — starts (or resumes) a real in-site conversation.
    // Requires login; if not logged in, sends the person to log in and
    // come straight back here to finish contacting the seller.
    // ---------------------------------------------------------------
    async function contactSeller(productId) {
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;

        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) {
            window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
            return;
        }

        const sellerId = product.seller_id || product.store_seller_id;
        if (!sellerId) {
            alert('This seller could not be reached right now. Please try again shortly.');
            return;
        }

        const { data: conversationId, error } = await supabaseClient.rpc('get_or_create_conversation', {
            p_product_id: product.id,
            p_seller_id: sellerId,
            p_store_id: product.store_id
        });

        if (error) {
            alert('Could not start a conversation: ' + error.message);
            return;
        }

        window.location.href = 'messages.html?conversation=' + conversationId;
    }

    document.getElementById('search_input').addEventListener('input', applyFilters);

    async function loadAnnouncement() {
        const { data } = await supabaseClient
            .from('announcements')
            .select('*')
            .eq('audience', 'store')
            .eq('is_active', true)
            .order('created_at', { ascending: false })
            .limit(1);
        if (data && data.length > 0) {
            document.getElementById('announcement_title').textContent = data[0].title;
            document.getElementById('announcement_body').textContent = data[0].body;
            document.getElementById('announcement_banner').classList.remove('hidden');
        }
    }

    async function loadProducts() {
        const { data, error } = await supabaseClient
            .from('product_feed')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            document.getElementById('product_grid').innerHTML = `<p class="col-span-full text-error">Could not load products: ${error.message}</p>`;
            return;
        }

        // Rank: gold > pro > free, then newest first
        const rank = { gold: 3, pro: 2, free: 1 };
        allProducts = (data || []).sort((a, b) => (rank[b.plan] || 1) - (rank[a.plan] || 1) || new Date(b.created_at) - new Date(a.created_at));
        await attachRatings(allProducts);

        applyFilters();
    }

    async function loadBellNotifications() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return; // anonymous browsing — no bell to show

        document.getElementById('notif_bell_wrap').classList.remove('hidden');

        const { data: notifRows } = await supabaseClient
            .from('notifications')
            .select('*')
            .eq('user_id', user.id)
            .eq('is_read', false)
            .order('created_at', { ascending: false });

        const { data: unreadMsgs } = await supabaseClient
            .from('messages')
            .select('conversation_id, created_at')
            .is('read_at', null)
            .neq('sender_id', user.id);

        const convMap = {};
        (unreadMsgs || []).forEach(m => {
            if (!convMap[m.conversation_id]) convMap[m.conversation_id] = { count: 0, latest: m.created_at };
            convMap[m.conversation_id].count++;
            if (m.created_at > convMap[m.conversation_id].latest) convMap[m.conversation_id].latest = m.created_at;
        });

        let convEntries = [];
        const convIds = Object.keys(convMap);
        if (convIds.length > 0) {
            const { data: convs } = await supabaseClient
                .from('conversations')
                .select('id, seller_id, seller:profiles!seller_id(full_name)')
                .in('id', convIds);
            convEntries = (convs || []).map(c => ({
                type: 'message',
                id: c.id,
                text: `${convMap[c.id].count} new message${convMap[c.id].count > 1 ? 's' : ''} from ${c.seller?.full_name || 'a seller'}`,
                created_at: convMap[c.id].latest
            }));
        }

        const notifEntries = (notifRows || []).map(n => ({ type: 'notification', id: n.id, text: n.message, created_at: n.created_at }));
        const combined = [...notifEntries, ...convEntries].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

        const badge = document.getElementById('notif_bell_badge');
        const totalCount = (notifRows ? notifRows.length : 0) + (unreadMsgs ? unreadMsgs.length : 0);
        if (totalCount > 0) {
            badge.textContent = totalCount > 99 ? '99+' : totalCount;
            badge.classList.remove('hidden');
            badge.classList.add('flex');
        } else {
            badge.classList.add('hidden');
            badge.classList.remove('flex');
        }

        const list = document.getElementById('notif_dropdown_list');
        const emptyEl = document.getElementById('notif_dropdown_empty');
        if (combined.length === 0) {
            list.innerHTML = '';
            emptyEl.classList.remove('hidden');
            return;
        }
        emptyEl.classList.add('hidden');

        list.innerHTML = combined.map(e => `
            <button class="w-full text-left p-md hover:bg-surface-container-low border-b border-outline-variant/10 flex items-start gap-sm notif-item" data-type="${e.type}" data-id="${e.id}">
                <span class="material-symbols-outlined text-primary text-lg flex-shrink-0">${e.type === 'message' ? 'chat' : 'notifications'}</span>
                <span class="text-sm text-on-surface flex-1">${e.text.replace(/</g, '&lt;')}</span>
            </button>
        `).join('');

        list.querySelectorAll('.notif-item').forEach(btn => {
            btn.addEventListener('click', async () => {
                const type = btn.getAttribute('data-type');
                const id = btn.getAttribute('data-id');
                if (type === 'notification') {
                    await supabaseClient.from('notifications').update({ is_read: true }).eq('id', id);
                    loadBellNotifications();
                } else {
                    window.location.href = 'messages.html?conversation=' + id;
                }
            });
        });
    }

    let bellChannelSubscribed = false;
    async function subscribeBellRealtimeOnce() {
        if (bellChannelSubscribed) return;
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return;
        bellChannelSubscribed = true;

        supabaseClient
            .channel('bell-notifications')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadBellNotifications())
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${user.id}` }, () => loadBellNotifications())
            .subscribe();
    }

    document.getElementById('notif_bell_btn').addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('notif_dropdown').classList.toggle('hidden');
    });
    document.addEventListener('click', (e) => {
        const wrap = document.getElementById('notif_bell_wrap');
        if (!wrap.contains(e.target)) document.getElementById('notif_dropdown').classList.add('hidden');
    });

    loadAnnouncement();
    loadProducts();
    loadBellNotifications();
    subscribeBellRealtimeOnce();
</script>
</body></html>
