<style>

</button>
<button class="absolute left-2 md:left-6 top-1/2 -translate-y-1/2 w-11 h-11 bg-white/10 hover:bg-white/20 text-white rounded-full flex items-center justify-center" id="viewer_prev_btn">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<img alt="" class="max-w-full max-h-full object-contain select-none" id="viewer_image"/>
<button class="absolute right-2 md:right-6 top-1/2 -translate-y-1/2 w-11 h-11 bg-white/10 hover:bg-white/20 text-white rounded-full flex items-center justify-center" id="viewer_next_btn">
<span class="material-symbols-outlined">chevron_right</span>
</button>

</div>

<script>
    const SUPABASE_URL = "https://wexvdmimqqiwarvswwbi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndleHZkbWltcXFpd2FydnN3d2JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4OTUzNjgsImV4cCI6MjA5ODQ3MTM2OH0.qwVb9IfUgqGsvt8nm-zINQrCtJjzmio8mWgxOWJCgZQ";
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allProducts = [];
    let filteredProducts = [];
    let currentPage = 0;
    let selectedCategory = 'all';
    const PAGE_SIZE = 30;

    function formatPrice(p) {
        if (p.product_type === 'service' && p.pricing_tiers && p.pricing_tiers.length) {
            const min = Math.min(...p.pricing_tiers.map(t => t.price));
            return `From ₦${min.toLocaleString()}`;
        }
        return `₦${Number(p.price).toLocaleString()}`;
    }

    function renderCategoryBar() {
        const cats = Array.from(new Set(allProducts.map(p => p.category).filter(Boolean)));
        const bar = document.getElementById('category_bar');
        const chips = ['all', ...cats];
        bar.innerHTML = chips.map(c => `
            <button class="flex-shrink-0 px-4 py-2 rounded-full text-sm font-bold border cat-chip ${selectedCategory === c ? 'bg-primary text-on-primary border-primary' : 'bg-white text-on-surface-variant border-outline-variant'}" data-cat="${c}">
                ${c === 'all' ? 'All' : c}
            </button>
        `).join('');
        bar.querySelectorAll('.cat-chip').forEach(btn => {
            btn.addEventListener('click', () => {
                selectedCategory = btn.getAttribute('data-cat');
                applyFilters();
            });
        });
    }

    function applyFilters() {
        const q = document.getElementById('search_input').value.toLowerCase();
        filteredProducts = allProducts.filter(p => {
            const matchesCategory = selectedCategory === 'all' || p.category === selectedCategory;
            const matchesSearch = !q ||
                p.name.toLowerCase().includes(q) ||
                (p.category || '').toLowerCase().includes(q) ||
                (p.store_name || '').toLowerCase().includes(q);
            return matchesCategory && matchesSearch;
        });
        currentPage = 0;
        renderCategoryBar();
        renderPage();
    }

    function renderPage() {
        document.getElementById('product_count').textContent = `${filteredProducts.length} products`;
        const start = currentPage * PAGE_SIZE;
        const pageItems = filteredProducts.slice(start, start + PAGE_SIZE);
        renderGrid(pageItems);

        const totalPages = Math.max(1, Math.ceil(filteredProducts.length / PAGE_SIZE));
        document.getElementById('page_indicator').textContent = `Page ${currentPage + 1} of ${totalPages}`;
        document.getElementById('prev_page_btn').disabled = currentPage === 0;
        document.getElementById('next_page_btn').disabled = currentPage >= totalPages - 1;
        document.getElementById('pagination_bar').style.display = filteredProducts.length > PAGE_SIZE ? 'flex' : 'none';

        pageItems.forEach(p => supabaseClient.rpc('track_impression', { p_product_id: p.id }));
    }

    document.getElementById('prev_page_btn').addEventListener('click', () => {
        if (currentPage > 0) { currentPage--; renderPage(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    });
    document.getElementById('next_page_btn').addEventListener('click', () => {
        const totalPages = Math.ceil(filteredProducts.length / PAGE_SIZE);
        if (currentPage < totalPages - 1) { currentPage++; renderPage(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    });

    function renderGrid(products) {
        const grid = document.getElementById('product_grid');

        if (products.length === 0) {
            grid.innerHTML = '<p class="col-span-full text-on-surface-variant">No products found.</p>';
            return;
        }

        grid.innerHTML = products.map(p => `
            <div class="product-card bg-surface-container-lowest rounded-xl p-sm shadow-[0_1px_3px_0_rgba(0,0,0,0.05)] flex flex-col" id="product-${p.id}" data-product-id="${p.id}">
                <div class="relative aspect-square rounded-lg overflow-hidden bg-surface-container mb-sm">
                    ${p.image_urls && p.image_urls[0] ? `<img class="w-full h-full object-cover" src="${p.image_urls[0]}" />` : '<div class="w-full h-full flex items-center justify-center text-on-surface-variant"><span class="material-symbols-outlined">image</span></div>'}
                    ${p.plan !== 'free' ? `<span class="absolute top-2 left-2 bg-primary text-on-primary badge-approved">${p.plan.toUpperCase()}</span>` : ''}
                </div>
                <h3 class="font-label-md text-on-surface line-clamp-1 mb-xs">${p.name}</h3>
                <div class="flex items-center gap-1 mb-xs">
                    <div class="w-5 h-5 rounded-full bg-surface-container-high overflow-hidden flex-shrink-0 flex items-center justify-center">
                        ${p.store_logo_url ? `<img src="${p.store_logo_url}" class="w-full h-full object-cover" />` : '<span class="material-symbols-outlined text-[12px] text-tertiary">storefront</span>'}
                    </div>
                    <p class="text-label-sm text-on-surface-variant truncate">${p.store_name || ''}</p>
                </div>
                <div class="flex justify-between items-center mt-auto pt-xs">
                    <span class="font-headline-md text-primary text-base">${formatPrice(p)}</span>
                </div>
                <button class="w-full h-10 mt-sm bg-primary text-on-primary rounded-lg text-sm font-bold flex items-center justify-center gap-1 contact-seller-btn" data-id="${p.id}">
                    <span class="material-symbols-outlined text-base">chat</span> Contact Seller
                </button>
            </div>
        `).join('');

        // Clicking anywhere on the card opens the full product detail view
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.closest('.contact-seller-btn')) return;
                openDetailModal(card.getAttribute('data-product-id'));
            });
        });

        // Contact Seller jumps straight into an in-site chat with them
        document.querySelectorAll('.contact-seller-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                contactSeller(btn.getAttribute('data-id'));
            });
        });

        const params = new URLSearchParams(window.location.search);
        const highlightId = params.get('product');
        if (highlightId) {
            const el = document.getElementById('product-' + highlightId);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.add('highlight');
            }
        }
    }

    // ---------------------------------------------------------------
    // Product detail modal — full image gallery + info + seller + chat
    // ---------------------------------------------------------------
    let detailProduct = null;
    let detailImageIndex = 0;

    function detailImages() {
        if (!detailProduct || !detailProduct.image_urls) return [];
        return detailProduct.image_urls.slice(0, 5); // up to 5 images
    }

    function openDetailModal(productId) {
        const p = allProducts.find(x => x.id === productId);
        if (!p) return;
        detailProduct = p;
        detailImageIndex = 0;
        renderDetailModal();
        document.getElementById('detail_panel').scrollTop = 0;
        document.getElementById('detail_modal').classList.remove('hidden');
        document.getElementById('detail_modal').classList.add('flex');
        document.body.style.overflow = 'hidden';
    }

    function closeDetailModal() {
        document.getElementById('detail_modal').classList.add('hidden');
        document.getElementById('detail_modal').classList.remove('flex');
        document.body.style.overflow = '';
    }

    function renderDetailModal() {
        const p = detailProduct;
        const images = detailImages();

        document.getElementById('detail_name').textContent = p.name;
        document.getElementById('detail_price').textContent = formatPrice(p);
        document.getElementById('detail_store_name').textContent = p.store_name || 'Mega Mart Seller';
        document.getElementById('detail_store_logo').innerHTML = p.store_logo_url
            ? `<img src="${p.store_logo_url}" class="w-full h-full object-cover" />`
            : '<span class="material-symbols-outlined text-tertiary">storefront</span>';

        const catEl = document.getElementById('detail_category');
        if (p.category) { catEl.textContent = p.category; catEl.classList.remove('hidden'); }
        else { catEl.classList.add('hidden'); }

        const descEl = document.getElementById('detail_description');
        if (p.description) { descEl.textContent = p.description; descEl.classList.remove('hidden'); }
        else { descEl.classList.add('hidden'); }

        document.getElementById('detail_tap_hint').classList.toggle('hidden', images.length === 0);

        renderDetailImage();
        renderDetailThumbs();
    }

    function renderDetailImage() {
        const images = detailImages();
        const main = document.getElementById('detail_main_image');
        if (images.length === 0) {
            main.src = '';
            main.classList.add('hidden');
        } else {
            main.src = images[detailImageIndex];
            main.classList.remove('hidden');
        }
        document.getElementById('detail_prev_img').classList.toggle('hidden', images.length <= 1);
        document.getElementById('detail_next_img').classList.toggle('hidden', images.length <= 1);

        const dots = document.getElementById('detail_dots');
        dots.innerHTML = images.length <= 1 ? '' : images.map((_, i) =>
            `<span class="w-1.5 h-1.5 rounded-full ${i === detailImageIndex ? 'bg-white' : 'bg-white/40'}"></span>`
        ).join('');
    }

    function renderDetailThumbs() {
        const images = detailImages();
        const wrap = document.getElementById('detail_thumbs');
        if (images.length <= 1) { wrap.innerHTML = ''; return; }
        wrap.innerHTML = images.map((url, i) => `
            <button class="thumb-btn w-16 h-16 rounded-lg overflow-hidden flex-shrink-0 border-2 ${i === detailImageIndex ? 'border-primary' : 'border-transparent'}" data-idx="${i}">
                <img src="${url}" class="w-full h-full object-cover" />
            </button>
        `).join('');
        wrap.querySelectorAll('.thumb-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                detailImageIndex = Number(btn.getAttribute('data-idx'));
                renderDetailImage();
                renderDetailThumbs();
            });
        });
    }

    document.getElementById('detail_prev_img').addEventListener('click', () => {
        const images = detailImages();
        detailImageIndex = (detailImageIndex - 1 + images.length) % images.length;
        renderDetailImage(); renderDetailThumbs();
    });
    document.getElementById('detail_next_img').addEventListener('click', () => {
        const images = detailImages();
        detailImageIndex = (detailImageIndex + 1) % images.length;
        renderDetailImage(); renderDetailThumbs();
    });

    document.getElementById('detail_main_image').addEventListener('click', () => {
        const images = detailImages();
        if (images.length === 0) return;
        openImageViewer(images, detailImageIndex);
    });

    document.getElementById('detail_close_btn').addEventListener('click', closeDetailModal);
    document.getElementById('detail_modal').addEventListener('click', (e) => {
        if (e.target.id === 'detail_modal') closeDetailModal();
    });

    document.getElementById('detail_chat_btn').addEventListener('click', () => {
        const p = detailProduct;
        closeDetailModal();
        contactSeller(p.id);
    });

    // ---------------------------------------------------------------
    // Fullscreen image viewer — covers the whole screen, swipe/arrow nav
    // ---------------------------------------------------------------
    let viewerImages = [];
    let viewerIndex = 0;

    function openImageViewer(images, startIndex) {
        viewerImages = images;
        viewerIndex = startIndex;
        renderViewer();
        document.getElementById('image_viewer').classList.remove('hidden');
        document.getElementById('image_viewer').classList.add('flex');
    }
    function closeImageViewer() {
        document.getElementById('image_viewer').classList.add('hidden');
        document.getElementById('image_viewer').classList.remove('flex');
    }
    function renderViewer() {
        document.getElementById('viewer_image').src = viewerImages[viewerIndex];
        document.getElementById('viewer_counter').textContent = `${viewerIndex + 1} / ${viewerImages.length}`;
        document.getElementById('viewer_prev_btn').classList.toggle('hidden', viewerImages.length <= 1);
        document.getElementById('viewer_next_btn').classList.toggle('hidden', viewerImages.length <= 1);
    }
    document.getElementById('viewer_close_btn').addEventListener('click', closeImageViewer);
    document.getElementById('viewer_prev_btn').addEventListener('click', () => {
        viewerIndex = (viewerIndex - 1 + viewerImages.length) % viewerImages.length;
        renderViewer();
    });
    document.getElementById('viewer_next_btn').addEventListener('click', () => {
        viewerIndex = (viewerIndex + 1) % viewerImages.length;
        renderViewer();
    });

    // Swipe support for mobile
    let touchStartX = 0;
    document.getElementById('image_viewer').addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
    });
    document.getElementById('image_viewer').addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) < 40 || viewerImages.length <= 1) return;
        if (dx > 0) { viewerIndex = (viewerIndex - 1 + viewerImages.length) % viewerImages.length; }
        else { viewerIndex = (viewerIndex + 1) % viewerImages.length; }
        renderViewer();
    });

    // Escape key closes whichever overlay is open (viewer first, then detail)
    document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        if (!document.getElementById('image_viewer').classList.contains('hidden')) { closeImageViewer(); return; }
        if (!document.getElementById('detail_modal').classList.contains('hidden')) { closeDetailModal(); return; }
    });

    // ---------------------------------------------------------------
    // Contact Seller — starts (or resumes) a real in-site conversation.
    // Requires login; if not logged in, sends the person to log in and
    // come straight back here to finish contacting the seller.
    // ---------------------------------------------------------------
    async function contactSeller(productId) {
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;

        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) {
            window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
            return;
        }

        const sellerId = product.seller_id || product.store_seller_id;
        if (!sellerId) {
            alert('This seller could not be reached right now. Please try again shortly.');
            return;
        }

        const { data: conversationId, error } = await supabaseClient.rpc('get_or_create_conversation', {
            p_product_id: product.id,
            p_seller_id: sellerId,
            p_store_id: product.store_id
        });

        if (error) {
            alert('Could not start a conversation: ' + error.message);
            return;
        }

        window.location.href = 'messages.html?conversation=' + conversationId;
    }

    document.getElementById('search_input').addEventListener('input', applyFilters);

    async function loadAnnouncement() {
        const { data } = await supabaseClient
            .from('announcements')
            .select('*')
            .eq('audience', 'store')
            .eq('is_active', true)
            .order('created_at', { ascending: false })
            .limit(1);
        if (data && data.length > 0) {
            document.getElementById('announcement_title').textContent = data[0].title;
            document.getElementById('announcement_body').textContent = data[0].body;
            document.getElementById('announcement_banner').classList.remove('hidden');
        }
    }

    async function loadProducts() {
        const { data, error } = await supabaseClient
            .from('product_feed')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            document.getElementById('product_grid').innerHTML = `<p class="col-span-full text-error">Could not load products: ${error.message}</p>`;
            return;
        }

        // Rank: gold > pro > free, then newest first
        const rank = { gold: 3, pro: 2, free: 1 };
        allProducts = (data || []).sort((a, b) => (rank[b.plan] || 1) - (rank[a.plan] || 1) || new Date(b.created_at) - new Date(a.created_at));

        applyFilters();
    }

    async function loadMessagesBadge() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return;

        const { data } = await supabaseClient
            .from('messages')
            .select('conversation_id')
            .is('read_at', null)
            .neq('sender_id', user.id);

        const badge = document.getElementById('messages_unread_badge');
        const count = (data || []).length;
        if (count > 0) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.classList.remove('hidden');
            badge.classList.add('flex');
        }
    }

    loadAnnouncement();
    loadProducts();
    loadMessagesBadge();
</script>
</body></html>
