<body class="bg-background min-h-screen flex flex-col">
<!-- TopAppBar for Brand Anchor -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-md h-16 bg-surface shadow-sm">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="storefront">storefront</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Mega Mart</span>
</div>
<div class="flex items-center">
<a class="text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors" href="#">Help</a>
</div>
</header>
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-gutter">
<div class="w-full max-w-[480px] bg-surface-container-lowest rounded-xl shadow-sm p-xl md:p-2xl border border-surface-container">
<!-- Welcome Header -->
<div class="mb-xl text-center md:text-left">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-xs">Join Mega Mart</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Create your account to start shopping and track orders.</p>
</div>
<!-- Sign Up Form -->
<form action="#" class="space-y-lg" method="POST">
<!-- Full Name -->
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="full_name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-tertiary text-[20px]" data-icon="person">person</span>
<input class="w-full h-12 pl-10 pr-4 bg-white border border-[#E2E8F0] rounded-lg input-focus-ring transition-all placeholder:text-outline-variant font-body-md text-body-md" id="full_name" name="full_name" placeholder="John Doe" required="" type="text"/>
</div>
</div>
<!-- Email Address -->
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-tertiary text-[20px]" data-icon="mail">mail</span>
<input class="w-full h-12 pl-10 pr-4 bg-white border border-[#E2E8F0] rounded-lg input-focus-ring transition-all placeholder:text-outline-variant font-body-md text-body-md" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Password -->
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-tertiary text-[20px]" data-icon="lock">lock</span>
<input class="w-full h-12 pl-10 pr-4 bg-white border border-[#E2E8F0] rounded-lg input-focus-ring transition-all placeholder:text-outline-variant font-body-md text-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="confirm_password">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-tertiary text-[20px]" data-icon="verified_user">verified_user</span>
<input class="w-full h-12 pl-10 pr-4 bg-white border border-[#E2E8F0] rounded-lg input-focus-ring transition-all placeholder:text-outline-variant font-body-md text-body-md" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
</div>
<!-- Terms & Privacy -->
<div class="flex items-start gap-sm py-xs">
<input class="mt-1 w-4 h-4 rounded border-[#E2E8F0] text-primary focus:ring-primary/20 cursor-pointer" id="terms" required="" type="checkbox"/>
<label class="font-label-sm text-label-sm text-on-surface-variant leading-tight cursor-pointer" for="terms">
                        I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Action Button -->
<button class="w-full h-[48px] bg-primary text-white font-headline-md text-headline-md rounded-lg shadow-sm hover:brightness-95 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                    Create Account
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>

<!-- Divider -->
<div class="relative my-xl">
<div class="absolute inset-0 flex items-center">

<button class="flex items-center justify-center h-12 border border-[#E2E8F0] rounded-lg hover:bg-surface-container-low transition-colors font-label-md text-label-md text-on-surface">
<span class="material-symbols-outlined mr-sm text-primary" data-icon="apple" data-weight="fill">apps</span>

</div>

<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">

                    <a class="text-primary font-bold hover:underline transition-all" href="#">Login</a>
</p>

<footer class="py-lg border-t border-surface-container mt-auto">
<div class="max-w-container-max mx-auto px-gutter flex flex-col md:flex-row justify-between items-center gap-md">
<div class="font-label-sm text-label-sm text-on-surface-variant">

            </div>
<div class="flex gap-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary" href="#">Privacy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary" href="#">Terms</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary" href="#">Cookies</a>
</div>

<!-- Simple validation micro-interaction -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const password = document.getElementById('password');
            const confirm = document.getElementById('confirm_password');
            const form = document.querySelector('form');

            form.addEventListener('submit', (e) => {
                if (password.value !== confirm.value) {
                    e.preventDefault();
                    confirm.classList.add('border-error');
                    confirm.classList.remove('border-[#E2E8F0]');
                    alert('Passwords do not match. Please try again.');
                }
            });

            confirm.addEventListener('input', () => {
                if (password.value === confirm.value) {
                    confirm.classList.remove('border-error');
                    confirm.classList.add('border-primary');
                } else {
                    confirm.classList.remove('border-primary');
                    confirm.classList.add('border-error');
                }
            });
        });
    </script>
